<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>For Alicja ❤️</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(145deg, #ffb6c1 0%, #fff0f5 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 0;
            padding: 20px;
            position: relative;
            overflow-x: hidden;
        }
    
        body::before {
            content: "❤️";
            font-size: 40px;
            position: absolute;
            top: 10px;
            left: 10px;
            opacity: 0.1;
            transform: rotate(-10deg);
            animation: float 6s infinite ease-in-out;
        }
        body::after {
            content: "❤️";
            font-size: 60px;
            position: absolute;
            bottom: 20px;
            right: 20px;
            opacity: 0.1;
            transform: rotate(15deg);
            animation: float 8s infinite ease-in-out reverse;
        }
        @keyframes float {
            0% { transform: translateY(0px) rotate(0deg); }
            50% { transform: translateY(-20px) rotate(5deg); }
            100% { transform: translateY(0px) rotate(0deg); }
        }

        .card {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(8px);
            border-radius: 40px;
            padding: 3rem 2rem;
            box-shadow: 0 20px 40px rgba(199, 21, 133, 0.3),
                        0 0 0 2px #ffb6c1 inset,
                        0 0 0 4px white inset;
            max-width: 600px;
            width: 100%;
            text-align: center;
            border: 4px solid #ff4d6d;
            position: relative;
            z-index: 10;
            transition: all 0.3s ease;
        }
        h1 {
            font-size: 3rem;
            color: #b30047;
            text-shadow: 3px 3px 0 #ffb6c1;
            margin-bottom: 1rem;
            font-weight: 800;
            letter-spacing: 1px;
        }
        .question {
            font-size: 2.5rem;
            color: #d44e77;
            margin: 1.5rem 0;
            font-weight: 600;
        }
        .buttons {
            display: flex;
            gap: 20px;
            justify-content: center;
            flex-wrap: wrap;
            margin: 2rem 0 1rem;
        }
        button {
            padding: 1rem 3rem;
            font-size: 2rem;
            font-weight: bold;
            border: none;
            border-radius: 60px;
            cursor: pointer;
            transition: 0.2s;
            box-shadow: 0 8px 0 rgba(0,0,0,0.1), 0 10px 20px rgba(199,21,133,0.3);
        }
        button#yes {
            background: #ff4d6d;
            color: white;
            border: 3px solid white;
        }
        button#yes:hover {
            background: #ff1e4d;
            transform: scale(1.05);
            box-shadow: 0 12px 0 rgba(0,0,0,0.1), 0 15px 25px #ff4d6d;
        }
        button#no {
            background: #6c757d;
            color: white;
            border: 3px solid white;
        }
        button#no:hover {
            background: #5a6268;
            transform: scale(1.05);
        }
        .happy-message, .sad-message {
            font-size: 3rem;
            line-height: 1.4;
            animation: popIn 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .happy-message {
            color: #c2185b;
        }
        .sad-message {
            color: #3d3d3d;
        }
        .heart {
            display: inline-block;
            font-size: 4rem;
            animation: heartbeat 1.5s infinite;
        }
        @keyframes heartbeat {
            0% { transform: scale(1); }
            25% { transform: scale(1.3); }
            35% { transform: scale(1); }
            45% { transform: scale(1.2); }
            55% { transform: scale(1); }
            100% { transform: scale(1); }
        }
        @keyframes popIn {
            0% { opacity: 0; transform: scale(0.8); }
            100% { opacity: 1; transform: scale(1); }
        }
        .sad-face {
            font-size: 3rem;
            filter: grayscale(0.5);
        }
        .message-text {
            margin: 20px 0;
        }
        .reset-link {
            margin-top: 30px;
            display: inline-block;
            color: #b30047;
            text-decoration: none;
            font-weight: bold;
            font-size: 1.2rem;
            border-bottom: 2px dotted #b30047;
            cursor: pointer;
        }
        .reset-link:hover {
            color: #ff4d6d;
        }
        .cat-image {
            width: 250px;
            border-radius: 30px;
            margin: 20px auto;
            display: block;
            box-shadow: 0 10px 20px rgba(0,0,0,0.2);
            border: 4px solid white;
        }
        .decor {
            position: absolute;
            font-size: 2rem;
            opacity: 0.2;
            pointer-events: none;
            z-index: 0;
        }
    </style>
</head>
<body>

    <div class="decor" style="top: 5%; left: 2%;">❤️</div>
    <div class="decor" style="top: 15%; right: 3%;">❤️</div>
    <div class="decor" style="bottom: 10%; left: 8%;">❤️</div>
    <div class="decor" style="bottom: 25%; right: 10%;">❤️</div>

    <div class="card" id="mainCard">
 
    </div>

    <script>
        const card = document.getElementById('mainCard');


        function showQuestion() {
            card.innerHTML = `
                <h1>❤️ Alicja..... ❤️</h1>
                <div class="question">Do you love me?</div>
                <div class="buttons">
                    <button id="yes">Yes 💖</button>
                    <button id="no">No 💔</button>
                </div>
                <div style="margin-top: 20px; font-size: 1.2rem; color: #b30047;">(i love kotek)</div>
            `;
       
            document.getElementById('yes').addEventListener('click', showHappy);
            document.getElementById('no').addEventListener('click', showSad);
        }

  
        function showHappy() {
            card.innerHTML = `
                <div class="happy-message">
                    <div class="heart">❤️</div>
                    <div class="heart">❤️</div>
                    <div class="heart">❤️</div>
                    <div class="message-text">I LOVE YOU TOO!!!</div>
                    <div class="heart">❤️</div>
                    <div class="heart">❤️</div>
                    <div class="heart">❤️</div>
                    <img src="meandlola.JPG" alt="just me and lola babi" class="cat-image">
                    <div style="font-size: 2rem; margin: 10px 0;">💖💗💓💕💞</div>
                    <p style="font-size: 1.2rem; color: #b30047;">You and kotek make me the happiest!</p>
                    <a class="reset-link" onclick="showQuestion()">🔙 Ask again?</a>
                </div>
            `;
        }


        function showSad() {
            card.innerHTML = `
                <div class="sad-message">
                    <div class="sad-face">😢😭😢😭😢</div>
                    <div class="message-text">noooooooooooooo :(</div>
                    <div class="sad-face">💔💔💔💔💔</div>
                    <p style="font-size: 1.2rem; color: #555;">BUT IM JUST A KOTEK THOUGH...</p>
                    <a class="reset-link" onclick="showQuestion()">🔙 Try again?</a>
                </div>
            `;
        }

     
        showQuestion();


        for (let i = 0; i < 6; i++) {
            let heart = document.createElement('div');
            heart.className = 'decor';
            heart.style.top = Math.random() * 90 + '%';
            heart.style.left = Math.random() * 90 + '%';
            heart.style.fontSize = (Math.random() * 3 + 1) + 'rem';
            heart.style.opacity = 0.15;
            heart.innerHTML = '❤️';
            document.body.appendChild(heart);
        }
    </script>
</body>
</html>
